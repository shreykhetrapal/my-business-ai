<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CallerDesk Login</title>
    <link rel="stylesheet" href="/styles.css?v=12" />
  </head>
  <body class="login-body">
    <main class="login-panel">
      <p class="eyebrow">CallerDesk</p>
      <h1>Sign in</h1>
      <form id="loginForm" class="login-form">
        <label>
          Email
          <input name="email" type="email" autocomplete="username" placeholder="admin@local.test" required />
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary-action">Sign in</button>
      </form>
      <div id="loginMessage" class="inline-result"></div>
    </main>
    <script type="module" src="/login.js?v=12"></script>
  </body>
</html>
